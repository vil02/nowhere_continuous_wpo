---
name: all_url_check

'on':
  workflow_dispatch:
  push:
  schedule:
    - cron: '25 */3 * * *'

jobs:
  run_lychee:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: link_check with lychee-action
        id: link_check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --verbose --insecure --no-progress **/*.tex **/*.md
          fail: true
...
